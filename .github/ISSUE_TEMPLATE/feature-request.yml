name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Use Case
      description: How would you use this feature? What problem does it solve for you?
    validations:
      required: true

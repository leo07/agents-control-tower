name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    attributes:
      label: Version
      description: Output of `npx agents-control-tower --version` or package.json version
    validations:
      required: true
  - type: input
    attributes:
      label: Node.js Version
      description: Output of `node --version`
    validations:
      required: false
